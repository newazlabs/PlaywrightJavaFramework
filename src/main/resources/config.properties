# Browser config
browser=chromium
headless=true
slowMo=0
viewport.width=1920
viewport.height=1080

# Timeouts (ms)
default.timeout=30000
navigation.timeout=30000

# Global fallbacks (overridden by portals/<name>.properties)
base.url=https://practicetestautomation.com
api.base.url=https://jsonplaceholder.typicode.com

# Test environment (dev | staging | prod)
env=staging

# Retry
retry.count=1

# Video/Trace
video=retain-on-failure
trace=retain-on-failure
screenshot=only-on-failure
