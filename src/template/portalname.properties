# PortalName Portal — replace with a short description of the portal
# Replace portalname with the lowercase name of your portal (e.g. myshop)

# The website URL your browser tests will open
base.url=https://www.portalname.com

# The base URL for all API calls (no trailing slash)
api.base.url=https://api.portalname.com

# Default test account credentials
credentials.username=testuser@portalname.com
credentials.password=TestPassword123

# Add any extra credentials or config values your tests need, for example:
# credentials.admin.username=admin@portalname.com
# credentials.admin.password=AdminPassword456
